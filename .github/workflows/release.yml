name: Build and Release

on:
  push:
    tags:
      - 'v*'  # when a tag like v1.0.0 is pushed
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write  # required for creating releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE (onedir)
        run: |
          pyinstaller --onedir --windowed --icon=app.ico --add-data "app.ico;." --name "PortKiller" portkiller.py

      - name: Compress build
        run: |
          powershell Compress-Archive -Path "dist\PortKiller\*" -DestinationPath "PortKiller-windows.zip" -Force

      - name: Install Inno Setup
        uses: Minionguyjpro/setup-innosetup@v1.1
        with:
          innosetup-version: '6.4.2'

      - name: Build Installer
        run: |
          iscc installer.iss

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files:
            - PortKiller-windows.zip
            - output/PortKiller-Setup.exe
          draft: false

      - name: Upload artifact (for manual workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: PortKiller-windows
          path:
            - PortKiller-windows.zip
            - output/PortKiller-Setup.exe